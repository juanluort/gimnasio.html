<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Tracker V2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-5xl font-bold mb-2">Gym Tracker V2</h1>
    <p class="text-zinc-400 mb-8">
      Guarda pesos, reps e historial automáticamente.
    </p>

    <div id="app"></div>
  </div>

  <script>
    const routine = {
      "Día 1: Pecho-Hombro-Tríceps": [
        { name: "Press banca", reps: [10, 6, 6, 10] },
        { name: "Press militar", reps: [10, 8, 8, 10] },
        { name: "Press inclinado mancuernas", reps: [8, 8, 8] },
        { name: "Elevaciones laterales", reps: [10, 10, 10] },
        { name: "Extensión tríceps", reps: [12, 12] },
        { name: "Tríceps Katana", reps: [12, 12] },
      ],
      "Día 2: Espalda-Bíceps": [
        { name: "Jalón pecho", reps: [8, 8, 8] },
        { name: "Remo Gironda", reps: [8, 8, 8] },
        { name: "Curl barra Z", reps: [10, 8, 10] },
        { name: "Jalón unilateral", reps: [10, 10] },
        { name: "Remo abierto", reps: [10, 10] },
      ],
      "Día 3: Frecuencia 2": [
        { name: "Aperturas pecho", reps: [10, 8, 8] },
        { name: "Elevaciones laterales mancuerna", reps: [12, 12, 12] },
        { name: "Jalón cerrado", reps: [10, 8, 8] },
        { name: "Press inclinado", reps: [10, 10, 10] },
        { name: "Curl Bayesian", reps: [10, 10] },
        { name: "Face Pull + Extensión tríceps", reps: [12, 12] },
      ]
    };

    const app = document.getElementById("app");

    function getData() {
      return JSON.parse(localStorage.getItem("gymTracker")) || {};
    }

    function saveData(data) {
      localStorage.setItem("gymTracker", JSON.stringify(data));
    }

    function saveWeight(day, exercise, setIndex, value) {
      const data = getData();

      if (!data[day]) data[day] = {};
      if (!data[day][exercise]) data[day][exercise] = {};

      data[day][exercise][setIndex] = {
        weight: value,
        date: new Date().toLocaleDateString()
      };

      saveData(data);
    }

    function render() {
      const data = getData();

      app.innerHTML = "";

      Object.entries(routine).forEach(([day, exercises]) => {
        const dayCard = document.createElement("div");
        dayCard.className = "bg-zinc-900 border border-zinc-800 rounded-3xl p-6 mb-8 shadow-xl";

        dayCard.innerHTML = `
          <h2 class="text-3xl font-bold mb-6">${day}</h2>
        `;

        exercises.forEach(exercise => {
          const exerciseCard = document.createElement("div");
          exerciseCard.className = "bg-zinc-950 border border-zinc-800 rounded-2xl p-5 mb-5";

          let setsHTML = "";

          exercise.reps.forEach((rep, index) => {
            const saved = data?.[day]?.[exercise.name]?.[index] || {};

            setsHTML += `
              <div class="bg-zinc-900 border border-zinc-700 rounded-xl p-4">
                <p class="text-zinc-400 text-sm mb-1">Serie ${index + 1}</p>
                <p class="font-semibold mb-3">Objetivo: ${rep} reps</p>

                <input
                  type="number"
                  step="0.5"
                  placeholder="Peso (kg)"
                  value="${saved.weight || ""}"
                  class="weight-input w-full bg-zinc-800 border border-zinc-700 rounded-lg p-3 outline-none focus:border-white"
                  data-day="${day}"
                  data-exercise="${exercise.name}"
                  data-set="${index}"
                />

                <div class="mt-3 text-xs text-zinc-500">
                  Último registro:<br>
                  ${saved.weight ? saved.weight + " kg" : "Sin datos"}<br>
                  ${saved.date || ""}
                </div>
              </div>
            `;
          });

          exerciseCard.innerHTML = `
            <h3 class="text-2xl font-semibold mb-4">${exercise.name}</h3>
            <div class="grid md:grid-cols-4 gap-4">
              ${setsHTML}
            </div>
          `;

          dayCard.appendChild(exerciseCard);
        });

        app.appendChild(dayCard);
      });

      document.querySelectorAll(".weight-input").forEach(input => {
        input.addEventListener("input", e => {
          const day = e.target.dataset.day;
          const exercise = e.target.dataset.exercise;
          const setIndex = e.target.dataset.set;
          const value = e.target.value;

          saveWeight(day, exercise, setIndex, value);
          render();
        });
      });
    }

    render();
  </script>
</body>
</html>
